name: ton618-web-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --omit=dev --audit-level=high

      - name: Validate env example
        run: npm run env:check -- --file=.env.example

      - name: Validate production env example
        run: npm run env:check -- --file=.env.production.example --mode=production

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify SPA routing (dist/index.html exists)
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html not found after build" && exit 1)
          echo "✅ SPA entry point exists"

      - name: Verify critical assets exist
        run: |
          test -f dist/robots.txt || (echo "ERROR: robots.txt missing" && exit 1)
          test -f dist/sitemap.xml || (echo "ERROR: sitemap.xml missing" && exit 1)
          echo "✅ SEO assets generated"

      - name: Upload build artifacts
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  production-gate:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full verify pipeline
        run: npm run verify

      - name: Check no secrets committed
        run: |
          echo "Scanning for potential secret leaks..."
          ! grep -rn "sk_live_\|lmsq_\|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIg\|ghp_\|AKIA" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --exclude-dir=node_modules --exclude-dir=dist . || \
            (echo "ERROR: Potential secret found in source!" && exit 1)
          echo "No secrets found in source."

      - name: Validate squarecloud.app config
        run: |
          echo "Checking squarecloud.app..."
          grep -q "^MAIN=" squarecloud.app || (echo "ERROR: MAIN missing" && exit 1)
          grep -q "^PORT=80" squarecloud.app || (echo "ERROR: PORT must be 80 for Square Cloud" && exit 1)
          grep -q "^HEALTHCHECK_PATH=" squarecloud.app || (echo "WARN: HEALTHCHECK_PATH not set")
          grep -q "^START=npm run start:squarecloud" squarecloud.app || (echo "ERROR: START command incorrect" && exit 1)
          echo "squarecloud.app OK"
